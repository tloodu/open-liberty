mcpServer.name=モデルコンテキストプロトコル（MCP）サーバー
mcpServer.description=MCP サーバー機能を構成します。

stateless.name=ステートレスモード
stateless.description=ステートレスモードでは、サーバーによるMCPセッションの追跡が無効化されます。 このモードでは、クラスタ環境におけるセッションアフィニティの必要性がなくなります。 そうでない場合、同じサーバーが同じMCPセッションからのリクエストを処理します。 サーバーにセッションデータが保存されないため、どのサーバーインスタンスでもあらゆるリクエストを処理でき、これにより負荷分散と水平スケーリングが簡素化されます。 ただし、ステートレスモードでは、セッション追跡や個別の HTTP リクエストの連結に依存するMCP機能（ツール呼び出しのキャンセルなど）も無効になります。
