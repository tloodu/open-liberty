mcpServer.name=Serwer protokołu kontekstowego modelu (MCP)
mcpServer.description=Skonfiguruj funkcję serwera MCP.

stateless.name=Tryb bezstanowy
stateless.description=Tryb bezstanowy wyłącza śledzenie sesji MCP przez serwer. Ten tryb eliminuje potrzebę stosowania powinowactwa sesji w środowisku klastrowym. W przeciwnym razie ten sam serwer obsługuje żądania z tej samej sesji MCP. Ponieważ na serwerach nie są przechowywane żadne dane sesji, każda instancja serwera może obsłużyć dowolne żądanie, co upraszcza równoważenie obciążenia i skalowanie horyzontalne. Jednak tryb bezstanowy wyłącza również funkcje MCP, które opierają się na śledzeniu sesji lub łączeniu oddzielnych żądań HTTP, takich jak anulowanie wywołania narzędzia.
