stateless.name=Tryb bezstanowy
stateless.description=Tryb bezstanowy wyłącza śledzenie sesji. Wyłączenie tej funkcji ułatwia tworzenie klastrów, ponieważ moduł równoważenia obciążenia nie musi zapewniać, że każda sesja jest obsługiwana przez jeden serwer zaplecza. Jednakże wyłącza to również funkcje MCP, które opierają się na śledzeniu sesji lub łączeniu oddzielnych HTTP żądań, takich jak anulowanie wywołania narzędzia
