mcpServer.name=Serveur MCP (Model Context Protocol)
mcpServer.description=Configurez la fonctionnalité Serveur MCP.

stateless.name=Mode sans état
stateless.description=Le mode sans état désactive le suivi de session. Cette désactivation facilite la mise en cluster, car le répartiteur de charge n''a pas besoin de s''assurer que chaque session est traitée par un seul serveur backend. Cependant, cela désactive également les fonctionnalités MCP qui reposent sur le suivi de session ou la liaison de requêtes HTTP distinctes entre elles, comme l''annulation d''un appel d''outil
