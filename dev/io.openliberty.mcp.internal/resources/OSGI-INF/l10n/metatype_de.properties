mcpServer.name=Model Context Protocol (MCP)-Server
mcpServer.description=Konfigurieren Sie die MCP-Server-Funktion.

stateless.name=Stateless-Modus
stateless.description=Der stateless-Modus deaktiviert die Sitzungsverfolgung. Diese Deaktivierung erleichtert das Clustering, da der Load Balancer nicht sicherstellen muss, dass jede Sitzung von einem einzelnen Backend-Server bedient wird. Allerdings werden dadurch auch MCP-Funktionen deaktiviert, die auf der Sitzungsverfolgung oder der Verknüpfung separater HTTP Anfragen basieren, wie beispielsweise das Abbrechen eines Tool-Aufrufs
