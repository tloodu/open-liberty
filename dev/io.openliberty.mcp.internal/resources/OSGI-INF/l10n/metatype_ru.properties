stateless.name=Режим без состояния
stateless.description=Режим без состояния отключает отслеживание сеансов. Это отключение упрощает кластеризацию, поскольку балансировщику нагрузки не нужно обеспечивать обслуживание каждого сеанса одним бэкэнд-сервером. Однако это также отключает функции MCP, которые зависят от отслеживания сеансов или связывания отдельных HTTP запросов, например отмена вызова инструмента
