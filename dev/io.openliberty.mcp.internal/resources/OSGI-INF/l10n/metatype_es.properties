mcpServer.name=Servidor de protocolo de contexto de modelo (MCP)
mcpServer.description=Configure la función del servidor MCP.

stateless.name=Modo sin estado
stateless.description=El modo sin estado desactiva el seguimiento de sesiones. Esta desactivación facilita la agrupación en clústeres, ya que el equilibrador de carga no necesita garantizar que cada sesión sea atendida por un único servidor backend. Sin embargo, también deshabilita las funciones MCP que dependen del seguimiento de sesiones o de la vinculación de HTTP solicitudes separadas, como la cancelación de una llamada a una herramienta
