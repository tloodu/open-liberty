mcpServer.name=Server MCP (Model Context Protocol)
mcpServer.description=Configurare la funzione Server MCP.

stateless.name=Modalità senza stato
stateless.description=La modalità senza stato disabilita il tracciamento delle sessioni MCP da parte del server. Questa modalità elimina la necessità dell''affinità di sessione in un ambiente clusterizzato. Altrimenti, lo stesso server gestisce le richieste provenienti dalla stessa sessione MCP. Poiché sui server non vengono memorizzati dati relativi alle sessioni, qualsiasi istanza server è in grado di gestire qualsiasi richiesta, semplificando il bilanciamento del carico e il ridimensionamento orizzontale. Tuttavia, la modalità senza stato disabilita anche le funzionalità MCP che si basano sul tracciamento delle sessioni o sul collegamento di richieste separate HTTP, come l''annullamento di una chiamata a uno strumento.
