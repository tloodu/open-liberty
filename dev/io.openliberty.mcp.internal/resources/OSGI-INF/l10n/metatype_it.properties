stateless.name=Modalità senza stato
stateless.description=La modalità senza stato disabilita il tracciamento delle sessioni. Questa disabilitazione semplifica il clustering perché il bilanciatore di carico non deve garantire che ogni sessione sia gestita da un unico server backend. Tuttavia, disabilita anche le funzionalità MCP che si basano sul tracciamento delle sessioni o sul collegamento di HTTP richieste separate tra loro, come l''annullamento di una chiamata a uno strumento
