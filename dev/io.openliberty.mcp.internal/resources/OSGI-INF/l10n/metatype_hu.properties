mcpServer.name=Modellkontextus-protokoll (MCP) szerver
mcpServer.description=Konfigurálja az MCP Server funkciót.

stateless.name=Állam nélküli mód
stateless.description=A stateless mód letiltja az MCP munkamenet nyomon követését a szerver által. Ez a mód megszünteti a munkamenet-affinitás szükségességét klaszterezett környezetben. Ellenkező esetben ugyanaz a szerver kezeli az ugyanazon MCP munkamenetből érkező kéréseket. Mivel a szervereken nem tárolnak munkamenetadatokat, bármelyik szerverpéldány képes bármilyen kérést feldolgozni, ami egyszerűsíti a terheléselosztást és a horizontális méretezést. A stateless mód azonban letiltja azokat az MCP funkciókat is, amelyek a munkamenet nyomon követésén vagy különálló HTTP kérések összekapcsolásán alapulnak, például az eszközhívás törlését.
