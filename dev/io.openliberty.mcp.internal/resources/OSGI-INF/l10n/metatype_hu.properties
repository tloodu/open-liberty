stateless.name=Állam nélküli mód
stateless.description=A stateless mód letiltja a munkamenet nyomon követését. Ez a letiltás megkönnyíti a fürtözést, mivel a terheléselosztónak nem kell biztosítania, hogy minden munkamenetet egyetlen háttérszerver szolgáljon ki. Ugyanakkor letiltja azokat az MCP funkciókat is, amelyek a munkamenet nyomon követésén vagy különálló HTTP kérések összekapcsolásán alapulnak, például az eszközhívás törlését
