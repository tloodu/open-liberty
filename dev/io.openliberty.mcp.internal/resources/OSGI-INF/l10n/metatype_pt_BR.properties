mcpServer.name=Servidor de Protocolo de Contexto de Modelo (MCP)
mcpServer.description=Configure o recurso Servidor MCP.

stateless.name=Modo sem estado
stateless.description=O modo sem estado desativa o rastreamento de sessão. Essa desativação facilita o clustering, pois o balanceador de carga não precisa garantir que cada sessão seja atendida por um único servidor backend. No entanto, isso também desativa os recursos do MCP que dependem do rastreamento de sessão ou da vinculação de solicitações HTTP separadas, como o cancelamento de uma chamada de ferramenta
