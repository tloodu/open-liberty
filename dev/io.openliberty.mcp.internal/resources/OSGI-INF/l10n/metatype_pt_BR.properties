mcpServer.name=Servidor de Protocolo de Contexto de Modelo (MCP)
mcpServer.description=Configure o recurso Servidor MCP.

stateless.name=Modo sem estado
stateless.description=O modo sem estado desativa o rastreamento de sessões MCP pelo servidor. Este modo elimina a necessidade de afinidade de sessão em um ambiente em cluster. Caso contrário, o mesmo servidor processa as solicitações da mesma sessão MCP. Como nenhum dado da sessão é armazenado nos servidores, qualquer instância do servidor pode lidar com qualquer solicitação, o que simplifica o balanceamento de carga e o dimensionamento horizontal. No entanto, o modo sem estado também desativa os recursos do MCP que dependem do rastreamento de sessão ou da vinculação de solicitações separadas HTTP, como o cancelamento de uma chamada de ferramenta.
