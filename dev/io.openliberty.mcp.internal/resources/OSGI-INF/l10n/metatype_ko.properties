mcpServer.name=모델 컨텍스트 프로토콜(MCP) 서버
mcpServer.description=MCP 서버 기능을 구성하십시오.

stateless.name=무상태 모드
stateless.description=무상태 모드는 서버의 MCP 세션 추적을 비활성화합니다. 이 모드는 클러스터 환경에서 세션 어피니티 설정이 필요 없도록 합니다. 그렇지 않으면 동일한 서버가 동일한 MCP 세션의 요청을 처리합니다. 서버에 세션 데이터가 저장되지 않기 때문에, 모든 서버 인스턴스가 모든 요청을 처리할 수 있어 부하 분산 및 수평 확장이 간소화됩니다. 그러나 상태 비저장 모드는 세션 추적에 의존하거나 별도의 HTTP 요청을 연결하는 MCP 기능(예: 도구 호출 취소)도 비활성화합니다.
