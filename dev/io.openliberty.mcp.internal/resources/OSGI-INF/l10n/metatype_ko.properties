stateless.name=무상태 모드
stateless.description=무상태 모드는 세션 추적을 비활성화합니다. 이 비활성화는 로드 밸런서가 각 세션이 단일 백엔드 서버에서 처리되도록 보장할 필요가 없기 때문에 클러스터링을 더 쉽게 만듭니다. 그러나 이는 또한 세션 추적이나 별도의 HTTP 요청을 연결하는 기능에 의존하는 MCP 기능을 비활성화합니다. 예를 들어 도구 호출 취소 등이 해당됩니다
