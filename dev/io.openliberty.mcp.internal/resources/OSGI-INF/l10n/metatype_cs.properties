stateless.name=Režim bez stavu
stateless.description=Režim bez stavu zakáže sledování relace. Toto deaktivování usnadňuje clusterování, protože vyvažovač zatížení nemusí zajišťovat, aby každá relace byla obsluhována jediným backendovým serverem. Zároveň však deaktivuje funkce MCP, které využívají sledování relací nebo propojování samostatných HTTP požadavků, jako je například zrušení volání nástroje
