stateless.name=Modul fără stare
stateless.description=Modul fără stare dezactivează urmărirea sesiunii. Această dezactivare facilitează clusterizarea, deoarece echilibratorul de sarcină nu trebuie să se asigure că fiecare sesiune este deservită de un singur server backend. Cu toate acestea, dezactivează și funcțiile MCP care se bazează pe urmărirea sesiunilor sau pe conectarea cererilor HTTP separate între ele, cum ar fi anularea unui apel de instrument
