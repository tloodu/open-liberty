mcpServer.name=Server Protocol Context Model (MCP)
mcpServer.description=Configurați funcția MCP Server.

stateless.name=Modul fără stare
stateless.description=Modul fără stare dezactivează urmărirea sesiunilor MCP de către server. Acest mod elimină necesitatea afinității sesiunii într-un mediu clusterizat. În caz contrar, același server gestionează cererile din aceeași sesiune MCP. Deoarece pe servere nu sunt stocate date de sesiune, orice instanță de server poate gestiona orice solicitare, ceea ce simplifică echilibrarea încărcării și scalarea orizontală. Cu toate acestea, modul fără stare dezactivează și funcțiile MCP care se bazează pe urmărirea sesiunilor sau pe conectarea cererilor separate HTTP, cum ar fi anularea unui apel de instrument.
