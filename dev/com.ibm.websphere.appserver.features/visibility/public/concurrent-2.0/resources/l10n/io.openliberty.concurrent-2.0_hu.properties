description=Ez a funkci\u00f3 lehet\u0151v\u00e9 teszi olyan fel\u00fcgyelt v\u00e9grehajt\u00f3k l\u00e9trehoz\u00e1s\u00e1t, amelyek lehet\u0151v\u00e9 teszik az alkalmaz\u00e1sok sz\u00e1m\u00e1ra, hogy p\u00e1rhuzamosan futtathat\u00f3 feladatokat ny\u00fajtsanak be, az alkalmaz\u00e1sszerver \u00e1ltal fel\u00fcgyelt sz\u00e1lkontextussal. Lehet\u0151v\u00e9 teszi tov\u00e1bb\u00e1 kezelt sz\u00e1lgy\u00e1rak l\u00e9trehoz\u00e1s\u00e1t is, amelyek olyan sz\u00e1lakat hoznak l\u00e9tre, amelyek a kezelt sz\u00e1lgy\u00e1rat felkeres\u0151 komponens sz\u00e1lkontextus\u00e1val futnak.
