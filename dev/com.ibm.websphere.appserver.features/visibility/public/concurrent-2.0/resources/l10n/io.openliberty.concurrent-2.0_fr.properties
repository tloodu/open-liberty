description=Cette fonction permet de cr\u00e9er des ex\u00e9cuteurs g\u00e9r\u00e9s qui permettent aux applications de soumettre des t\u00e2ches \u00e0 ex\u00e9cuter simultan\u00e9ment, avec un contexte d'unit\u00e9 d'ex\u00e9cution g\u00e9r\u00e9 par le serveur d'applications. Il permet \u00e9galement la cr\u00e9ation d'usines de threads g\u00e9r\u00e9es afin de cr\u00e9er des threads qui s'ex\u00e9cutent avec le contexte de thread du composant qui recherche l'usine de threads g\u00e9r\u00e9e.
