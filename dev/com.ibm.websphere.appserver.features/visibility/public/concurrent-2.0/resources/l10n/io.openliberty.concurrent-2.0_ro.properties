description=Aceast\u0103 caracteristic\u0103 permite crearea de executori gestiona\u021bi care permit aplica\u021biilor s\u0103 trimit\u0103 sarcini pentru a fi executate simultan, cu contextul thread gestionat de serverul de aplica\u021bii. De asemenea, permite crearea de fabrici de thread-uri gestionate pentru a crea thread-uri care ruleaz\u0103 cu contextul thread-ului componentei care caut\u0103 fabrica de thread-uri gestionat\u0103.
