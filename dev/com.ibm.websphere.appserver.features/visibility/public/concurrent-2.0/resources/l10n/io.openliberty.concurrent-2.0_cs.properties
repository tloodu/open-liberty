description=Tato funkce umo\u017e\u0148uje vytv\u00e1\u0159en\u00ed spravovan\u00fdch vykonavatel\u016f, kte\u0159\u00ed umo\u017e\u0148uj\u00ed aplikac\u00edm odes\u00edlat \u00fakoly ke spu\u0161t\u011bn\u00ed soub\u011b\u017en\u011b, s kontextem vl\u00e1kna spravovan\u00fdm aplika\u010dn\u00edm serverem. Umo\u017e\u0148uje tak\u00e9 vytv\u00e1\u0159en\u00ed spravovan\u00fdch tov\u00e1ren vl\u00e1ken pro vytv\u00e1\u0159en\u00ed vl\u00e1ken, kter\u00e1 b\u011b\u017e\u00ed s kontextem vl\u00e1kna komponenty, kter\u00e1 vyhled\u00e1v\u00e1 spravovanou tov\u00e1rnu vl\u00e1ken.
