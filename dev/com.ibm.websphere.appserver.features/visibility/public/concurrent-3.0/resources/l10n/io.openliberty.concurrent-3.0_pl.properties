description=Ta funkcja umo\u017cliwia tworzenie zarz\u0105dzanych wykonawc\u00f3w, kt\u00f3rzy pozwalaj\u0105 aplikacjom na przesy\u0142anie zada\u0144 do jednoczesnego wykonania, z kontekstem w\u0105tku zarz\u0105dzanym przez serwer aplikacji. Umo\u017cliwia r\u00f3wnie\u017c tworzenie zarz\u0105dzanych fabryk w\u0105tk\u00f3w w celu tworzenia w\u0105tk\u00f3w, kt\u00f3re dzia\u0142aj\u0105 w kontek\u015bcie w\u0105tku komponentu, kt\u00f3ry wyszukuje zarz\u0105dzan\u0105 fabryk\u0119 w\u0105tk\u00f3w.
