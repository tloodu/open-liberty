description=Questa funzione consente la creazione di eseguibili gestiti che permettono alle applicazioni di inviare attivit\u00e0 da eseguire in modo simultaneo, con un contesto thread gestito dal server dell'applicazione. Consente inoltre la creazione di thread factory gestiti per creare thread che vengono eseguiti con il contesto thread del componente che ricerca la thread factory gestita.
