description=Esse recurso possibilita a cria\u00e7\u00e3o de executores gerenciados que permitem que os aplicativos submetam tarefas para serem executadas simultaneamente, com contexto de encadeamento que \u00e9 gerenciado pelo servidor de aplicativos. Ele tamb\u00e9m permite a cria\u00e7\u00e3o de f\u00e1bricas de threads gerenciadas para criar threads que s\u00e3o executadas com o contexto de thread do componente que pesquisa a f\u00e1brica de threads gerenciada.
