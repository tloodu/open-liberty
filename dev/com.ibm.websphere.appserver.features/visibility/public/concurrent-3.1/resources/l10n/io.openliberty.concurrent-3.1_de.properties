description=Dieses Feature erm\u00f6glicht die Erstellung von Steuerprogrammen f\u00fcr verwaltete Tasks, die Anwendungen die gleichzeitige Ausf\u00fchrung von Tasks mit Threadkontext erm\u00f6glichen, der vom Anwendungsserver verwaltet wird. Es erm\u00f6glicht auch die Erstellung von verwalteten Thread-Fabriken, um Threads zu erstellen, die mit dem Thread-Kontext der Komponente ausgef\u00fchrt werden, die die verwaltete Thread-Fabrik aufruft.
