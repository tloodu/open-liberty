#CMVCPATHNAME com.ibm.ws.filetransfer/resources/OSGI-INF/l10n/metatype.properties
#ISMESSAGEFILE FALSE
#NLS_ENCODING=UNICODE
#NLS_MESSAGEFORMAT_NONE

remoteFileAccess.name=Zdalny dost\u0119p do pliku
remoteFileAccess.desc=Ten element zawiera artefakty, kt\u00f3re steruj\u0105 poziomem dost\u0119pu do pliku udost\u0119pnionego dla po\u0142\u0105cze\u0144 zdalnych. 

readDir.name=Katalog prawa do odczytu
readDir.desc=Katalog, z kt\u00f3rego zdalni klienci mog\u0105 odczytywa\u0107 dane. Mo\u017ce istnie\u0107 wiele element\u00f3w readDir, a ka\u017cdy z nich reprezentuje pojedynczy katalog, kt\u00f3ry mo\u017ce odnosi\u0107 si\u0119 do zmiennych lub \u015bcie\u017cek bezwzgl\u0119dnych. Domy\u015blnie s\u0105 to ${wlp.install.dir}, ${wlp.user.dir} i ${server.output.dir}

writeDir.name=Katalog prawa do zapisu
writeDir.desc=Katalog, w kt\u00f3rym zdalne klienty mog\u0105 odczytywa\u0107 i zapisywa\u0107 dane. Mo\u017ce istnie\u0107 wiele element\u00f3w writeDir, a ka\u017cdy reprezentuje pojedynczy katalog, kt\u00f3ry mo\u017ce odwo\u0142ywa\u0107 si\u0119 do zmiennych lub pe\u0142nych \u015bcie\u017cek. Warto\u015b\u0107 domy\u015blna to pusty zestaw katalog\u00f3w.

blockDir.name=Zablokuj dost\u0119p do odczytu i zapisu katalogu
blockDir.desc=Katalog, do kt\u00f3rego klienci nie maj\u0105 uprawnie\u0144 odczytu ani zapisu, niezale\u017cnie od konfiguracji readDir lub writeDir. Mo\u017ce istnie\u0107 wiele element\u00f3w blockDir, a ka\u017cdy z nich reprezentuje pojedynczy katalog, kt\u00f3ry mo\u017ce odnosi\u0107 si\u0119 do zmiennych lub \u015bcie\u017cek bezwzgl\u0119dnych. Domy\u015blnym ustawieniem jest ${server.output.dir} /resources/security.

disableBlockList.name=Wy\u0142\u0105cz list\u0119 blokowanych
disableBlockList.desc=Flaga boolowska s\u0142u\u017c\u0105ca do wy\u0142\u0105czenia listy blokowanych adres\u00f3w. Warto\u015bci\u0105 domy\u015bln\u0105 jest false (fa\u0142sz). Je\u015bli ustawiono warto\u015b\u0107 true, wszelkie konfiguracje blockDir zostan\u0105 zignorowane.

