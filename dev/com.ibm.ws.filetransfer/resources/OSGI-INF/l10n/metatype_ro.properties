#CMVCPATHNAME com.ibm.ws.filetransfer/resources/OSGI-INF/l10n/metatype.properties
#ISMESSAGEFILE FALSE
#NLS_ENCODING=UNICODE
#NLS_MESSAGEFORMAT_NONE

remoteFileAccess.name=Acces fi\u015fiere la distan\u0163\u0103
remoteFileAccess.desc=Acest element con\u0163ine artefacte care controleaz\u0103 nivelul de acces fi\u015fiere expus conexiunilor la distan\u0163\u0103. 

readDir.name=Director acces citire
readDir.desc=Un director din care pot citi clien\u0163ii la distan\u0163\u0103. Pot fi multiple elemente readDir, \u015fi fiecare reprezint\u0103 un singur director care poate face referire la c\u0103i variabile sau absolute. Valoarea implicit\u0103 este ${wlp.install.dir}, ${wlp.user.dir} \u015fi ${server.output.dir}

writeDir.name=Director acces scriere
writeDir.desc=Un director din care pot citi clien\u0163ii la distan\u0163\u0103 \u015fi \u00een care pot scrie. Pot fi multiple elemente writeDir, \u015fi fiecare reprezint\u0103 un singur director care poate face referire la c\u0103i variabile sau absolute.  Implicit exist\u0103 un set gol de directoare.

blockDir.name=Blocarea accesului la citire \u0219i scriere \u00een director
blockDir.desc=Un director pe care clien\u021bii nu au permisiunea s\u0103 \u00eel citeasc\u0103 sau s\u0103 scrie \u00een el, indiferent de configura\u021bia readDir sau writeDir. Pot exista mai multe elemente blockDir, iar fiecare reprezint\u0103 un singur director care poate face referire la variabile sau c\u0103i absolute. Implicit este ${server.output.dir} /resources/security.

disableBlockList.name=Dezactiveaz\u0103 lista de blocare
disableBlockList.desc=Un indicator boolean pentru a dezactiva lista de blocare. Valoarea implicit\u0103 este fals. Dac\u0103 este setat la true, atunci orice configura\u021bie blockDir va fi ignorat\u0103.

