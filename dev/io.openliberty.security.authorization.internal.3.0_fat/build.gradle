/******************************************************************
 ******************************************************************
 **
 ** Copy feature bundles and applications to specific servers.
 **
 ******************************************************************
 ******************************************************************/

customizeAutoFVT {
  dependsOn ':com.ibm.ws.security.authorization.jacc.testprovider:assemble'
  dependsOn ':io.openliberty.security.authorization.jacc.testprovider:assemble'

  def testProvider1Project = project(':com.ibm.ws.security.authorization.jacc.testprovider')
  def testProvider2Project = project(':io.openliberty.security.authorization.jacc.testprovider')
  doLast {

    /*
     * Copy the JACC test provider feature.
     */
    copy {
      from new File(testProvider1Project.projectDir, "/build/libs/com.ibm.ws.security.authorization.jacc.testprovider.jakarta.jar") 
      into new File(autoFvtDir, 'publish/bundles')
      rename 'com.ibm.ws.security.authorization.jacc.testprovider.jakarta.jar', 'com.ibm.ws.security.authorization.jacc.testprovider_2.1.jar'
    }
    copy {
      from new File(testProvider2Project.projectDir, "/build/libs/io.openliberty.security.authorization.jacc.testprovider.jar") 
      into new File(autoFvtDir, 'publish/bundles')
      rename 'io.openliberty.security.authorization.jacc.testprovider.jar', 'io.openliberty.security.authorization.jacc.testprovider_3.0.jar'
    }
    copy {
      from new File(testProvider2Project.projectDir, "/build/libs/io.openliberty.security.authorization.jacc.testprovider.spec.jar")
      into new File(autoFvtDir, 'publish/bundles')
      rename 'io.openliberty.security.authorization.jacc.testprovider.spec.jar', 'io.openliberty.security.authorization.jacc.testprovider.spec_3.0.jar'
    }
    copy {
    // purposely not copying this one over and using the one in this project's publish/features directory instead
    // because it includes the tolerates that the user could add to try out moving to EE 11 features
    // from new File(testProvider1Project.projectDir ,"/publish/usr/extension/lib/features/jaccTestProvider-2.1.mf")  
      from new File(testProvider2Project.projectDir ,"/publish/usr/extension/lib/features/jaccTestProvider-3.0.mf")  
      from new File(testProvider2Project.projectDir ,"/publish/usr/extension/lib/features/authzTestProvider-3.0.mf")
      into new File(autoFvtDir, 'publish/features')
    }
  }
}
